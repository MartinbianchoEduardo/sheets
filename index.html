<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <!-- maximum-scale + user-scalable disable iOS Safari's auto-zoom on focused
       inputs (which fires for any field with font-size < 16px). Pinch-zoom is
       still honored by iOS 10+ regardless of these values. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0e0e0e" />
  <title>Gastos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --bg-elev: #181818;
      --bg-elev-2: #232323;
      --border: #2a2a2a;
      --text: #f4f0e8;
      --text-dim: #9a958c;
      --text-mute: #6a665e;
      --accent: #d4ff3c;
      --accent-dim: #a3c428;
      --danger: #ff6b5e;
      --ok: #6bd99a;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Fraunces', Georgia, serif;
      font-size: 16px;
      line-height: 1.4;
      overscroll-behavior: none;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex;
      flex-direction: column;
    }

    /* ---------- Layout ---------- */
    .app {
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 20px 0;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 12px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .brand {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 34px;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .brand em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-mute);
      transition: background 0.3s;
    }
    .status-dot.ok { background: var(--ok); }
    .status-dot.err { background: var(--danger); }

    /* ---------- Tabs ---------- */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-elev);
      padding: 4px;
      border-radius: 999px;
      margin-bottom: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .tab {
      flex: 1;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      border-radius: 999px;
      cursor: pointer;
      transition: background-color 0.25s ease, color 0.25s ease;
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
    }
    .tab.active {
      background: var(--accent);
      color: #0a0a0a;
      font-weight: 700;
    }

    /* ---------- Outro inbox badge ---------- */
    .outro-badge {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--accent);
      color: #0a0a0a;
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
    }
    .outro-badge.visible { display: inline-flex; }
    .outro-badge:active { transform: scale(0.95); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ---------- Forms ---------- */
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    input[type=text],
    input[type=date],
    input[type=number],
    input[type=password],
    select,
    textarea {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Fraunces', serif;
      font-size: 17px;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-elev-2);
    }
    input::placeholder {
      color: var(--text-mute);
      font-style: italic;
    }

    /* Valor field gets a special treatment */
    .valor-wrap {
      position: relative;
    }
    .valor-wrap::before {
      content: 'R$';
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-mute);
      pointer-events: none;
    }
    .valor-wrap input { padding-left: 44px; font-variant-numeric: tabular-nums; }

    /* Category chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text-dim);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .chip:active { transform: scale(0.95); }
    .chip.selected {
      background: var(--accent);
      color: #0a0a0a;
      border-color: var(--accent);
      font-weight: 700;
    }

    /* Submit button */
    .btn-primary {
      width: 100%;
      padding: 18px;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 14px;
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      margin-top: 8px;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled {
      background: var(--bg-elev-2);
      color: var(--text-mute);
      cursor: not-allowed;
    }

    /* ---------- In-place row editing ---------- */
    .entry { user-select: none; -webkit-user-select: none; }
    .entry.editing {
      display: block;
      border-left: 2px solid var(--accent);
      background: var(--bg-elev);
      border-radius: 10px;
      padding: 16px 16px 12px;
      border-bottom: none;
      margin: 8px 0;
    }
    /* Row morph animation: max-height is set inline by JS (FLIP-style);
       the transition + overflow-hidden are global so both expand and shrink animate. */
    .entry.morphing {
      overflow: hidden;
      transition: max-height 0.26s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .entry.collapsing { /* used for delete animation */
      overflow: hidden;
      transition: max-height 0.22s ease, opacity 0.18s ease, padding 0.22s ease, margin 0.22s ease, border 0.22s ease;
    }
    /* Stagger fade-in for editor children when entering edit mode */
    .entry.editing .edit-row,
    .entry.editing .edit-fatura,
    .entry.editing .edit-chips,
    .entry.editing .edit-actions {
      animation: edit-fade-in 0.22s ease-out backwards;
    }
    .entry.editing .edit-row:nth-of-type(1) { animation-delay: 0.02s; }
    .entry.editing .edit-row:nth-of-type(2) { animation-delay: 0.06s; }
    .entry.editing .edit-fatura            { animation-delay: 0.09s; }
    .entry.editing .edit-chips             { animation-delay: 0.11s; }
    .entry.editing .edit-actions           { animation-delay: 0.14s; }

    /* Mirror fade-in for display row when shrinking back from edit — without
       this, the new (display) content snaps in instantly while the box
       smoothly shrinks around it, which feels abrupt. Scoped to .morphing so
       it only fires during the edit→display transition, not on initial list
       renders. */
    .entry.morphing:not(.editing) .entry-desc { animation: edit-fade-in 0.22s ease-out 0.04s backwards; }
    .entry.morphing:not(.editing) .entry-valor { animation: edit-fade-in 0.22s ease-out 0.07s backwards; }
    .entry.morphing:not(.editing) .entry-meta  { animation: edit-fade-in 0.22s ease-out 0.10s backwards; }

    @keyframes edit-fade-in {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: none; }
    }
    .edit-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .edit-row input {
      width: 100%;
      padding: 11px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Fraunces', serif;
      font-size: 15px;
      -webkit-appearance: none;
      appearance: none;
    }
    .edit-row input:focus { outline: none; border-color: var(--accent); }
    .edit-valor { flex: 1; font-variant-numeric: tabular-nums; }
    .edit-data { flex: 1; }
    .edit-fatura {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-mute);
      margin: -4px 0 16px;
    }
    .edit-fatura::before { content: 'fatura · '; }
    .edit-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 18px;
    }
    .edit-chips .chip {
      padding: 7px 11px;
      font-size: 11px;
    }
    .edit-actions {
      display: flex;
      justify-content: flex-start;
      gap: 22px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      padding-top: 4px;
    }
    .edit-action {
      background: none;
      border: none;
      padding: 4px 0;
      cursor: pointer;
      color: var(--accent);
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
    }
    .edit-action.danger { color: var(--danger); }
    .edit-action.muted { color: var(--text-mute); }
    .edit-action:active { transform: scale(0.95); }

    /* ---------- Tab deck (horizontal scroll-snap) ---------- */
    .deck {
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      margin: 0 -20px;
      min-height: 0;
    }
    .deck::-webkit-scrollbar { display: none; }
    .deck-page {
      flex: 0 0 100%;
      scroll-snap-align: start;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 20px 120px;
      min-width: 0;
    }

    /* ---------- Toast action (e.g., "desfazer") ---------- */
    .toast-action {
      background: none;
      border: none;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      cursor: pointer;
      padding: 4px 0;
      margin-left: 14px;
    }
    .toast { display: inline-flex; align-items: center; }

    /* ---------- History ---------- */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .entry {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .entry-desc {
      font-size: 16px;
      letter-spacing: -0.01em;
      grid-column: 1;
    }
    .entry-valor {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      align-self: start;
    }
    .entry-meta {
      grid-column: 1 / -1;
      display: flex;
      gap: 10px;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-mute);
    }
    .entry-cat {
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--bg-elev);
      color: var(--text-dim);
    }

    /* ---------- Summary ---------- */
    .summary-picker {
      margin-bottom: 16px;
    }
    .summary-picker label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .summary-picker select {
      background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%),
                        linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
      background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 36px;
    }

    .summary-totals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }
    .stat-card.fatura {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, var(--bg-elev) 0%, var(--bg-elev-2) 100%);
      border-color: var(--accent-dim);
    }
    .stat-card .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .stat-card .value {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      font-size: 22px;
    }
    .stat-card.fatura .value { font-size: 34px; }

    .summary-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .summary-card-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .summary-card-title .total {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 13px;
      color: var(--text);
    }
    .summary-bar {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-top: 1px solid var(--border);
      font-size: 14px;
      align-items: baseline;
    }
    .summary-bar:first-of-type { border-top: none; padding-top: 0; }
    .summary-bar-cat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--text-dim);
    }
    .summary-bar-cat .count {
      color: var(--text-mute);
      margin-left: 6px;
      font-size: 10.5px;
    }
    .summary-bar-val {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    .panel-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }
    .panel-row:first-of-type { border-top: none; padding-top: 0; }
    .panel-row .desc { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .panel-row .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.05em;
      color: var(--text-mute);
    }
    .panel-row .val {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 12.5px;
      white-space: nowrap;
    }

    .averages-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px 14px;
      padding: 7px 0;
      border-top: 1px solid var(--border);
      font-size: 13px;
      align-items: baseline;
    }
    .averages-row:first-of-type { border-top: none; padding-top: 0; }
    .averages-row .cat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      letter-spacing: 0.04em;
      color: var(--text-dim);
    }
    .averages-row .avg {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: var(--text-mute);
    }
    .averages-row .delta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      min-width: 56px;
      text-align: right;
    }
    .averages-row .delta.up    { color: var(--danger); }
    .averages-row .delta.down  { color: var(--ok); }
    .averages-row .delta.flat  { color: var(--text-mute); }

    /* ---------- Rollover banner ---------- */
    .rollover {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg-elev);
      border: 1px solid var(--accent-dim);
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .rollover .msg { color: var(--text-dim); }
    .rollover .msg strong { color: var(--text); font-weight: 500; }
    .rollover button {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 999px;
      padding: 6px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 700;
    }
    .rollover button:active { transform: scale(0.95); }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-elev-2);
      color: var(--text);
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      /* Above the subpage overlay (z 100) so toasts triggered from inside
         Regras/Importar still float on top. */
      z-index: 200;
      pointer-events: none;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .toast.ok { border-color: var(--ok); }
    .toast.err { border-color: var(--danger); color: var(--danger); }

    /* ---------- Lock screen ---------- */
    .lock {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 24px;
      max-width: 420px;
      margin: 0 auto;
    }
    .lock h1 {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-style: italic;
      font-size: 56px;
      line-height: 0.9;
      letter-spacing: -0.04em;
      margin: 0 0 4px;
    }
    .lock p {
      color: var(--text-dim);
      font-size: 15px;
      margin: 0 0 32px;
      font-style: italic;
    }

    /* ---------- Empty ---------- */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-mute);
      font-style: italic;
    }

    /* ---------- Loading ---------- */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(10,10,10,0.2);
      border-top-color: #0a0a0a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    /* ---------- Painel ---------- */
    .painel-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 16px;
    }
    .painel-card-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
    .painel-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 7px 0;
      border-top: 1px solid var(--border);
      font-size: 14px;
    }
    .painel-line:first-of-type { border-top: none; padding-top: 0; }
    .painel-line .lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      letter-spacing: 0.04em;
      color: var(--text-dim);
    }
    .painel-line .val {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }
    .painel-line.strong .lbl { color: var(--text); }
    .painel-line.strong .val { color: var(--text); font-weight: 700; }
    .painel-line .val.neg { color: var(--danger); }
    .painel-line .val.pos { color: var(--ok); }

    .painel-big {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .painel-big .stat-card .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-mute);
      margin-top: 4px;
    }

    .reserve-bar {
      height: 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 6px;
    }
    .reserve-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      transition: width 0.3s ease;
    }
    .reserve-meta {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 11.5px;
      color: var(--text-dim);
    }
    .reserve-spark {
      width: 100%;
      height: 70px;
      margin-top: 12px;
      display: block;
    }
    .reserve-spark path { fill: rgba(212, 255, 60, 0.12); }
    .reserve-spark polyline { fill: none; stroke: var(--accent); stroke-width: 1.5; }

    /* ---------- Configurações ---------- */
    .config-section {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .config-section h3 {
      margin: 0 0 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      font-weight: 400;
    }
    .config-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 14px;
      align-items: center;
      padding: 9px 0;
      border-top: 1px solid var(--border);
    }
    .config-row:first-of-type { border-top: none; padding-top: 0; }
    .config-row .lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      letter-spacing: 0.04em;
      color: var(--text-dim);
    }
    .config-row input[type=text],
    .config-row input[type=number],
    .config-row input[type=date],
    .config-row select {
      padding: 9px 12px;
      /* 16px keeps iOS Safari from auto-zooming on focus. */
      font-size: 16px;
      width: 140px;
      background: var(--bg);
      border-radius: 8px;
    }
    .config-row .hint {
      grid-column: 1 / -1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--text-mute);
      letter-spacing: 0.04em;
    }

    .fatura-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      padding: 10px 0;
      border-top: 1px solid var(--border);
    }
    .fatura-row:first-of-type { border-top: none; padding-top: 0; }
    .fatura-row .nome {
      font-size: 15px;
      letter-spacing: -0.01em;
    }
    .fatura-row .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-mute);
      grid-column: 1;
    }
    .fatura-row .actions {
      grid-row: 1 / span 2;
      grid-column: 2;
      align-self: center;
      display: flex;
      gap: 12px;
    }
    .fatura-row.editing { display: block; }
    .fatura-edit {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .fatura-edit .field { margin: 0; }
    .fatura-edit .field.full { grid-column: 1 / -1; }
    .fatura-edit .field label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .fatura-edit .field .hint {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-mute);
      margin-top: 4px;
    }
    .fatura-edit input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Fraunces', serif;
      font-size: 16px;
      -webkit-appearance: none;
      appearance: none;
    }
    .fatura-edit input:focus { outline: none; border-color: var(--accent); }

    .config-btn-row {
      margin-top: 16px;
      display: flex;
      gap: 16px;
      justify-content: flex-end;
    }
    .config-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      cursor: pointer;
      padding: 4px 0;
    }
    .config-btn.danger { color: var(--danger); }
    .config-btn.muted { color: var(--text-mute); }
    .config-btn:active { transform: scale(0.95); }

    /* ---------- Config action cards (open subpages) ---------- */
    .config-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .action-card {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 20px 22px 20px 26px;
      background: linear-gradient(135deg, var(--bg-elev) 0%, var(--bg-elev-2) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      overflow: hidden;
      text-align: left;
      color: var(--text);
      font-family: inherit;
      transition:
        transform 0.18s cubic-bezier(0.2, 0.8, 0.2, 1),
        border-color 0.2s ease;
    }
    .action-card::before {
      /* Accent rail on the left edge — small, audacious. */
      content: '';
      position: absolute;
      left: 0; top: 14px; bottom: 14px;
      width: 3px;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }
    .action-card:active { transform: scale(0.985); border-color: var(--accent); }
    .action-card .ac-icon {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: rgba(212, 255, 60, 0.10);
      color: var(--accent);
      flex-shrink: 0;
    }
    .action-card .ac-icon svg { display: block; }
    .action-card .ac-body { min-width: 0; }
    .action-card .ac-title {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .action-card .ac-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-mute);
      margin-top: 6px;
    }
    .action-card .ac-chev {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      color: var(--text-dim);
      line-height: 1;
    }

    /* ---------- Subpage overlay ---------- */
    /* A single fixed-position layer that slides in from the right. Lives above
       the app and the lock screen. Contents toggle by data-subpage — we never
       unmount, so re-opening the same kind preserves scroll/state. */
    .subpage {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      pointer-events: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex;
    }
    .subpage.open {
      transform: translateX(0);
      pointer-events: auto;
    }
    .subpage.dragging { transition: none; }
    /* Inner column mirrors .app exactly: same max-width, same outer padding
       (24px top, 20px sides, 0 bottom), so the back-arrow header lines up
       with the brand header and the body content lines up with the deck
       pages on both mobile and desktop. */
    .subpage-inner {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 20px 0;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      flex: 1;
    }
    .subpage-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .subpage-back {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
    }
    .subpage-back:active { transform: scale(0.92); background: var(--bg-elev-2); }
    .subpage-header h2 {
      margin: 0;
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.02em;
    }
    .subpage-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      /* Inner already provides the 20px sides; body adds bottom space for
         the iOS keyboard / home-bar gutter, matching .deck-page. */
      padding: 0 0 120px;
      min-width: 0;
    }
    .subpage-content.hidden { display: none; }

    /* ---------- Regras (merchant rules) ---------- */
    .regras-list {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 6px 16px;
      margin-bottom: 16px;
    }
    .regra-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px 10px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--border);
    }
    .regra-row:first-of-type { border-top: none; }
    .regra-row .chave {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'Fraunces', serif;
      font-size: 16px;
      min-width: 0;
    }
    .regra-row .chave:focus { outline: none; border-color: var(--accent); }
    .regra-row .cat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'Fraunces', serif;
      font-size: 16px;
      -webkit-appearance: none;
      appearance: none;
    }
    .regra-row .arrows {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .regra-row .arrow-btn,
    .regra-row .del-btn {
      background: none;
      border: none;
      color: var(--text-mute);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
    }
    .regra-row .arrow-btn:active,
    .regra-row .del-btn:active { transform: scale(0.9); }
    .regra-row .del-btn { color: var(--danger); font-size: 11px; }
    .regra-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 14px;
      justify-content: flex-end;
      margin-top: 2px;
    }
    .regra-action {
      background: none;
      border: none;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      cursor: pointer;
      padding: 2px 0;
    }
    .regra-action.danger { color: var(--danger); }
    .regra-action.muted { color: var(--text-mute); }
    .add-regra-btn {
      width: 100%;
      background: none;
      border: 1px dashed var(--border);
      color: var(--text-dim);
      padding: 12px;
      border-radius: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      cursor: pointer;
    }
    .add-regra-btn:active { transform: scale(0.99); }

    /* ---------- Importar (CSV) ---------- */
    .import-section {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .import-section h3 {
      margin: 0 0 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      font-weight: 400;
    }
    .import-textarea {
      width: 100%;
      min-height: 140px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      resize: vertical;
      margin: 12px 0;
    }
    .import-textarea:focus { outline: none; border-color: var(--accent); }
    .import-file {
      display: block;
      margin-top: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
    }
    .import-btn-row {
      display: flex;
      gap: 12px;
      margin-top: 14px;
    }
    .import-btn {
      flex: 1;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .import-btn.primary {
      background: var(--accent);
      color: #0a0a0a;
      font-weight: 700;
      border-color: var(--accent);
    }
    .import-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .import-btn:active:not(:disabled) { transform: scale(0.99); }

    .preview-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 10px;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      /* iOS-style swipe-to-dismiss: opt out of native horizontal panning so the
         deck's tab swipe doesn't fight us inside a row. Vertical scrolling
         still goes to the page; horizontal motion goes to our JS handler. */
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
      transition:
        transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1),
        opacity   0.25s cubic-bezier(0.2, 0.8, 0.2, 1),
        max-height 0.22s ease-out,
        padding-top 0.22s ease-out,
        padding-bottom 0.22s ease-out,
        border-top-width 0.22s ease-out;
      overflow: hidden;
    }
    .preview-row.swiping {
      /* Finger-following: kill easing so transform sticks to the touch position. */
      transition: none;
    }
    .preview-row:first-of-type { border-top: none; }
    .preview-row.outro { background: rgba(255, 107, 94, 0.06); margin: 0 -10px; padding: 10px; border-radius: 8px; }
    .preview-row.outro + .preview-row { border-top-color: transparent; }
    .preview-row .desc {
      font-size: 14px;
      letter-spacing: -0.01em;
      grid-column: 1;
    }
    .preview-row .val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      text-align: right;
      grid-column: 2;
      align-self: start;
      font-variant-numeric: tabular-nums;
    }
    .preview-row .meta {
      grid-column: 1 / -1;
      display: flex;
      gap: 10px;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-mute);
    }
    .preview-row .cat-sel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 4px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      text-transform: uppercase;
      -webkit-appearance: none;
      appearance: none;
    }
    .preview-row.outro .cat-sel { border-color: var(--danger); }
    .preview-row .outro-flag {
      color: var(--danger);
      font-weight: 700;
    }
    .preview-invalid {
      color: var(--danger);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 8px 0;
    }
    .preview-summary {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }

    /* ---------- Histórico filter ---------- */
    .history-filter {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .history-filter label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .history-filter select {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      padding: 6px 30px 6px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      -webkit-appearance: none;
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%),
                        linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
      background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    /* ---------- Cache freshness badge ---------- */
    .cache-age {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-mute);
      text-align: right;
      margin-bottom: 10px;
      min-height: 14px;
    }
  </style>
</head>
<body>

  <!-- LOCK SCREEN -->
  <div id="lock" class="lock">
    <h1>gastos<em>.</em></h1>
    <p id="lock-msg">Toque para entrar com Face ID</p>

    <button class="btn-primary" id="lock-btn">Entrar</button>

    <div id="register-form" class="hidden" style="margin-top: 8px;">
      <div class="field">
        <label>Bootstrap secret</label>
        <input type="text" id="bootstrap-input" placeholder="Cole o segredo aqui" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
      </div>
      <button class="btn-primary" id="register-btn">Registrar dispositivo</button>
    </div>

    <p style="margin-top: 32px; font-size: 13px; text-align: center; color: var(--text-mute); font-style: normal;">
      <a id="register-link" href="#" style="color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; border-bottom: 1px dotted var(--text-mute); padding-bottom: 2px;">Registrar este dispositivo</a>
    </p>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="app hidden">
    <header>
      <div class="brand">gastos<em>.</em></div>
      <div class="header-right">
        <button id="outro-badge" class="outro-badge" type="button" title="Lançamentos sem categoria">
          <span id="outro-count">0</span>
          <span>outros</span>
        </button>
        <div class="status-dot" id="status-dot" title="Status da conexão"></div>
      </div>
    </header>

    <div id="rollover" class="rollover hidden">
      <div class="msg">Nova fatura: <strong id="rollover-name"></strong></div>
      <button id="rollover-btn" type="button">Trocar</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="add">+ Novo</button>
      <button class="tab" data-tab="history">Hist</button>
      <button class="tab" data-tab="summary">Resumo</button>
      <button class="tab" data-tab="painel">Painel</button>
      <button class="tab" data-tab="config">Config</button>
    </div>

    <div class="deck" id="deck">
      <!-- ADD VIEW -->
      <section id="view-add" class="deck-page">
        <div class="field">
          <label>Data</label>
          <input type="date" id="f-data" />
        </div>

        <div class="field">
          <label>Descrição</label>
          <input type="text" id="f-descricao" placeholder="Ex: Sushi em casa" maxlength="200" />
        </div>

        <div class="field">
          <label>Valor</label>
          <div class="valor-wrap">
            <input type="text" id="f-valor" inputmode="decimal" placeholder="0,00" />
          </div>
        </div>

        <div class="field">
          <label>Categoria</label>
          <div class="chips" id="f-categoria"></div>
        </div>

        <div class="field">
          <label>Fatura</label>
          <input type="text" id="f-fatura" readonly placeholder="—" />
        </div>

        <button class="btn-primary" id="submit-btn">Adicionar lançamento</button>
      </section>

      <!-- HISTORY VIEW -->
      <section id="view-history" class="deck-page">
        <div class="history-filter">
          <label for="history-cat">Categoria</label>
          <select id="history-cat">
            <option value="">todas</option>
          </select>
        </div>
        <div class="cache-age" id="history-age"></div>
        <div id="history-list" class="history-list">
          <div class="empty">Carregando...</div>
        </div>
      </section>

      <!-- SUMMARY VIEW -->
      <section id="view-summary" class="deck-page">
        <div class="cache-age" id="summary-age"></div>
        <div class="summary-picker">
          <label>Fatura</label>
          <select id="summary-select"></select>
        </div>
        <div id="summary-body">
          <div class="empty">Carregando...</div>
        </div>
      </section>

      <!-- PAINEL VIEW -->
      <section id="view-painel" class="deck-page">
        <div class="cache-age" id="painel-age"></div>
        <div class="summary-picker">
          <label>Fatura</label>
          <select id="painel-select"></select>
        </div>
        <div id="painel-body">
          <div class="empty">Carregando...</div>
        </div>
      </section>

      <!-- CONFIG VIEW -->
      <section id="view-config" class="deck-page">
        <div id="config-body">
          <div class="empty">Carregando...</div>
        </div>
      </section>
    </div>
  </div>

  <!-- SUBPAGE: slides in over the app for Regras and Importar. Panel is
       full-width (the dark bg matches the desktop margins around .app);
       inner column is constrained to the same max-width as .app. -->
  <div id="subpage" class="subpage" aria-hidden="true">
    <div class="subpage-inner">
      <header class="subpage-header">
        <button class="subpage-back" id="subpage-back" type="button" aria-label="Voltar">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <h2 id="subpage-title">—</h2>
      </header>
      <div class="subpage-body">
        <div id="regras-body" class="subpage-content hidden" data-subpage="regras">
          <div class="empty">Carregando...</div>
        </div>
        <div id="import-body" class="subpage-content hidden" data-subpage="import">
          <div class="empty">Carregando...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Runtime config (Worker URL etc.) — gitignored, ships with the deploy.
       See config.example.js for the template. -->
  <script src="./config.local.js"></script>

  <script type="module">
    import { startRegistration, startAuthentication }
      from 'https://esm.sh/@simplewebauthn/browser@13.1.0';

    // ============= CONFIG =============
    // WORKER_URL is injected by config.local.js (gitignored). The source tree
    // only contains the template at config.example.js so the deployed Worker
    // URL stays out of the public repo.
    const WORKER_URL = (window.__GASTOS_CONFIG__ || {}).WORKER_URL;
    if (!WORKER_URL) {
      document.body.innerHTML = '<pre style="color:#ff6b5e;padding:24px;font-family:monospace;">'
        + 'config.local.js not loaded. Copy config.example.js → config.local.js and set WORKER_URL.'
        + '</pre>';
      throw new Error('config_not_loaded');
    }
    // ==================================

    const CATEGORIES = [
      'Assinatura', 'Café', 'Carro', 'Comida', 'Educação', 'Emprestado',
      'Farmácia', 'Lazer', 'Mercado', 'Outro', 'Parcela', 'Pix',
      'Presente', 'Recorrente', 'Viagem'
    ];

    const $ = id => document.getElementById(id);
    let jwt = sessionStorage.getItem('gastos_jwt') || '';
    let selectedCategoria = '';

    // Module-scoped UI state. `faturas` is loaded at init from /api/faturas/list.
    // `currentFaturaId` is the cycle the user is operating in — set at init from
    // /api/faturas/current (which respects the server override). It only moves
    // when the user accepts the rollover banner; the Resumo dropdown is a view
    // selector that does NOT mutate this.
    const state = {
      faturas: [],
      currentFaturaId: null,
      faturaOverrideSet: false,
      editingId: null,
      outroCount: 0,
    };
    // Resumo's view-only fatura selection (independent from state.currentFaturaId).
    let summaryViewFaturaId = null;
    let painelViewFaturaId = null;

    // ---------- Session / fetch helpers ----------
    function setJwt(v) {
      jwt = v || '';
      if (v) sessionStorage.setItem('gastos_jwt', v);
      else sessionStorage.removeItem('gastos_jwt');
      scheduleTokenRefresh();
    }

    // Decode the unverified `exp` claim out of a JWT payload. We only use this
    // for scheduling; signature verification still happens server-side on every call.
    function decodeJwtExp(token) {
      try {
        const [, payloadB64] = String(token).split('.');
        if (!payloadB64) return null;
        const b64 = payloadB64.replace(/-/g, '+').replace(/_/g, '/');
        const pad = b64.length % 4 ? 4 - (b64.length % 4) : 0;
        const { exp } = JSON.parse(atob(b64 + '='.repeat(pad)));
        return typeof exp === 'number' ? exp : null;
      } catch { return null; }
    }

    // Proactively refresh ~60s before expiry so long-open tabs don't hit an
    // expired token when the user finally taps submit.
    let refreshTimer;
    function scheduleTokenRefresh() {
      clearTimeout(refreshTimer);
      if (!jwt) return;
      const exp = decodeJwtExp(jwt);
      if (!exp) return;
      const ms = Math.max(0, exp * 1000 - Date.now() - 60 * 1000);
      refreshTimer = setTimeout(refreshToken, ms);
    }

    async function refreshToken() {
      if (!jwt) return;
      try {
        const { data } = await workerFetch('/auth/refresh', {
          method: 'POST', headers: authHeaders(), body: '{}',
        });
        if (data.ok && data.jwt) setJwt(data.jwt);  // re-schedules via setJwt
      } catch { /* silent — next api() call will surface session_expired and redirect to lock */ }
    }

    // ---------- Read-cache (localStorage; mobile-first: survives reloads + PWA close) ----------
    // Tab switches render instantly from cache; no background revalidation. Writes from
    // this app invalidate explicitly; the TTL is only a safety net for edits made
    // directly in the Sheet.
    // v2_ marks the cutover from Apps Script payloads to D1 payloads. Bumping
    // the prefix orphans every legacy cache entry so stale Sheet data can't leak.
    const CACHE_PREFIX = 'gastos_cache_v2_';
    const CACHE_TTL_MS = 30 * 60 * 1000;

    function cacheGet(key) {
      try {
        const raw = localStorage.getItem(CACHE_PREFIX + key);
        if (!raw) return null;
        const { ts, payload } = JSON.parse(raw);
        if (Date.now() - ts > CACHE_TTL_MS) return null;
        return { ts, payload };
      } catch { return null; }
    }

    function cacheSet(key, payload) {
      try {
        localStorage.setItem(CACHE_PREFIX + key, JSON.stringify({ ts: Date.now(), payload }));
      } catch { /* quota / private mode — silent */ }
    }

    function cacheInvalidate(...keys) {
      try { keys.forEach(k => localStorage.removeItem(CACHE_PREFIX + k)); } catch {}
    }

    // Wipe every `summary:fatura:*` cache entry — used on transaction writes,
    // since one tx can affect any fatura (e.g. moving its date across a cycle).
    function cacheInvalidateAllSummaries() {
      wipeWithPrefix('summary:fatura:');
    }

    // Same idea for the Painel payload: a tx, settings change, or fatura edit
    // can shift any fatura's dashboard numbers.
    function cacheInvalidateAllDashboards() {
      wipeWithPrefix('dashboard:fatura:');
    }

    function wipeWithPrefix(suffix) {
      try {
        const prefix = CACHE_PREFIX + suffix;
        const doomed = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(prefix)) doomed.push(k);
        }
        doomed.forEach(k => localStorage.removeItem(k));
      } catch {}
    }

    function cacheInvalidateAllDerived() {
      cacheInvalidateAllSummaries();
      cacheInvalidateAllDashboards();
    }

    function formatAge(tsMs) {
      const sec = Math.floor((Date.now() - tsMs) / 1000);
      if (sec < 30) return 'atualizado agora';
      if (sec < 60) return 'atualizado há menos de 1 min';
      const min = Math.floor(sec / 60);
      if (min < 60) return `atualizado há ${min} min`;
      const h = Math.floor(min / 60);
      if (h < 24) return `atualizado há ${h} h`;
      return `atualizado há ${Math.floor(h / 24)} d`;
    }

    function setCacheAge(elId, tsMs) {
      const el = $(elId);
      if (el) el.textContent = formatAge(tsMs);
    }

    function authHeaders(extra) {
      const h = { 'Content-Type': 'application/json', ...(extra || {}) };
      if (jwt) h['Authorization'] = 'Bearer ' + jwt;
      return h;
    }

    async function workerFetch(path, init) {
      if (!WORKER_URL || WORKER_URL.startsWith('PASTE_')) {
        throw new Error('configure_worker_url');
      }
      const res = await fetch(WORKER_URL + path, init);
      const data = await res.json().catch(() => ({ ok: false, error: 'bad_json' }));
      return { res, data };
    }

    // ---------- Auth: login with passkey ----------
    async function loginWithPasskey() {
      const btn = $('lock-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        const { data: opts } = await workerFetch('/auth/login/options', {
          method: 'POST',
          headers: authHeaders(),
          body: '{}',
        });
        if (!opts.ok) throw new Error(opts.error || 'no_options');

        const assertion = await startAuthentication({ optionsJSON: opts.options });

        const { data: verify } = await workerFetch('/auth/login/verify', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ response: assertion, challengeToken: opts.challengeToken }),
        });
        if (!verify.ok || !verify.jwt) throw new Error(verify.error || 'verify_failed');

        setJwt(verify.jwt);
        $('status-dot').className = 'status-dot ok';
        showApp();
      } catch (err) {
        if (err.name === 'NotAllowedError') toast('Autenticação cancelada', 'err');
        else toast('Erro: ' + (err.message || err), 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    // ---------- Auth: register a device ----------
    // iOS Safari requires startRegistration() to fire inside the same user
    // gesture that triggered it. A prompt() dialog (or setTimeout) breaks
    // that chain, so we use an inline form: the user taps a real button,
    // which directly drives the WebAuthn ceremony.
    async function registerDevice() {
      const bootstrapSecret = $('bootstrap-input').value.trim();
      if (!bootstrapSecret && !jwt) return toast('Cole o bootstrap secret', 'err');

      const btn = $('register-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        const headers = authHeaders();
        if (bootstrapSecret) headers['X-Bootstrap-Secret'] = bootstrapSecret;

        const { data: opts } = await workerFetch('/auth/register/options', {
          method: 'POST', headers, body: '{}',
        });
        if (!opts.ok) throw new Error(opts.error || 'no_options');

        const attestation = await startRegistration({ optionsJSON: opts.options });

        const { data: verify } = await workerFetch('/auth/register/verify', {
          method: 'POST', headers,
          body: JSON.stringify({ response: attestation, challengeToken: opts.challengeToken }),
        });
        if (!verify.ok) throw new Error(verify.error || 'register_failed');

        toast('Dispositivo registrado ✓ — toque Entrar', 'ok');
        hideRegisterForm();
        $('bootstrap-input').value = '';
      } catch (err) {
        if (err.name === 'NotAllowedError') toast('Registro cancelado', 'err');
        else toast('Erro: ' + (err.message || err), 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Registrar dispositivo';
      }
    }

    function showRegisterForm() {
      $('register-form').classList.remove('hidden');
      $('lock-btn').classList.add('hidden');
      $('register-link').classList.add('hidden');
      $('lock-msg').textContent = 'Cole o bootstrap secret e toque registrar';
      setTimeout(() => $('bootstrap-input').focus(), 50);
    }

    function hideRegisterForm() {
      $('register-form').classList.add('hidden');
      $('lock-btn').classList.remove('hidden');
      $('register-link').classList.remove('hidden');
      $('lock-msg').textContent = 'Toque para entrar com Face ID';
    }

    $('lock-btn').onclick = loginWithPasskey;
    $('register-btn').onclick = registerDevice;
    $('register-link').onclick = (e) => { e.preventDefault(); showRegisterForm(); };

    // On page load: try to refresh an existing JWT for a one-tap-skip experience.
    (async () => {
      if (!jwt) return;
      try {
        const { data } = await workerFetch('/auth/refresh', {
          method: 'POST', headers: authHeaders(), body: '{}',
        });
        if (data.ok && data.jwt) {
          setJwt(data.jwt);
          $('status-dot').className = 'status-dot ok';
          showApp();
          return;
        }
      } catch { /* fall through to lock screen */ }
      setJwt('');
    })();

    function showApp() {
      $('lock').classList.add('hidden');
      $('app').classList.remove('hidden');
      init();
    }

    function showLock() {
      closeSubpage();
      $('app').classList.add('hidden');
      $('lock').classList.remove('hidden');
    }

    // ---------- App API (proxied through Worker) ----------
    async function api(action, payload) {
      const { res, data } = await workerFetch('/api/' + action, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify(payload || {}),
      });
      if (res.status === 401 || data.error === 'token_expired' || data.error === 'token_bad_signature') {
        setJwt('');
        showLock();
        throw new Error('session_expired');
      }
      $('status-dot').className = 'status-dot ok';
      if (!data.ok) throw new Error(data.error || 'unknown_error');
      return data;
    }

    // ---------- UI: Tabs + deck scroll-snap ----------
    // Tab pill is the source-of-truth for the visible page on tap; scroll
    // position is the source-of-truth on swipe. IntersectionObserver bridges
    // the two: whichever page is >50% in view sets the active pill.
    const TAB_ORDER = ['add', 'history', 'summary', 'painel', 'config'];

    function scrollToTab(name, behavior = 'smooth') {
      const idx = TAB_ORDER.indexOf(name);
      if (idx < 0) return;
      const deck = $('deck');
      deck.scrollTo({ left: deck.clientWidth * idx, behavior });
    }

    function setActiveTab(name) {
      document.querySelectorAll('.tab').forEach(x => {
        x.classList.toggle('active', x.dataset.tab === name);
      });
      refreshRolloverBanner();
      if (name === 'history') loadHistory();
      if (name === 'summary') loadSummary();
      if (name === 'painel')  loadPainel();
      if (name === 'config')  loadConfig();
    }

    document.querySelectorAll('.tab').forEach(t => {
      t.onclick = () => scrollToTab(t.dataset.tab);
    });

    // ---------- Subpage (Regras / Importar) ----------
    // Single fixed overlay that slides in from the right. The subpage hosts
    // both #regras-body and #import-body — exactly one is visible at a time.
    // Dismiss via the back button or an iOS-style edge swipe from the left.
    const SUBPAGE_TITLES = { regras: 'Regras', import: 'Importar' };

    function openSubpage(kind) {
      if (!SUBPAGE_TITLES[kind]) return;
      const sub = $('subpage');
      $('subpage-title').textContent = SUBPAGE_TITLES[kind];
      document.querySelectorAll('.subpage-content').forEach(el => {
        el.classList.toggle('hidden', el.dataset.subpage !== kind);
      });
      sub.setAttribute('aria-hidden', 'false');
      sub.classList.add('open');
      // Lazy-load content on open so coming back to the same kind is instant.
      if (kind === 'regras') loadRegras();
      if (kind === 'import') renderImportView();
    }

    function closeSubpage() {
      const sub = $('subpage');
      sub.classList.remove('open');
      sub.style.transform = '';
      sub.setAttribute('aria-hidden', 'true');
    }

    $('subpage-back').onclick = closeSubpage;

    // Edge swipe: only catches touches that start within the leftmost ~20px
    // (matches iOS UINavigationController). Anywhere else, gestures fall
    // through to the underlying content — so the preview-row swipe-to-delete
    // and the textarea cursor placement both keep working untouched.
    (function wireSubpageEdgeSwipe() {
      const sub = $('subpage');
      let startX = 0, currentX = 0;
      let active = false;
      const EDGE_PX = 22;

      function onStart(e) {
        if (!sub.classList.contains('open')) return;
        const t = e.touches[0];
        if (t.clientX > EDGE_PX) { active = false; return; }
        startX = t.clientX;
        currentX = 0;
        active = true;
        sub.classList.add('dragging');
      }

      function onMove(e) {
        if (!active) return;
        const t = e.touches[0];
        const dx = t.clientX - startX;
        if (dx < 0) { sub.style.transform = ''; return; }
        currentX = dx;
        sub.style.transform = `translateX(${dx}px)`;
      }

      function onEnd() {
        if (!active) return;
        active = false;
        sub.classList.remove('dragging');
        if (currentX > sub.offsetWidth * 0.3) {
          closeSubpage();
        } else {
          // Snap back: clear inline transform and let the CSS transition
          // ease back to translateX(0) — since .open is still set.
          sub.style.transform = '';
        }
      }

      sub.addEventListener('touchstart', onStart, { passive: true });
      sub.addEventListener('touchmove',  onMove,  { passive: true });
      sub.addEventListener('touchend',   onEnd);
      sub.addEventListener('touchcancel', onEnd);
    })();

    // Wire up the observer after init() so it doesn't fire prematurely.
    function wireDeckObserver() {
      const deck = $('deck');
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.intersectionRatio >= 0.5) {
            const name = entry.target.id.replace('view-', '');
            setActiveTab(name);
          }
        });
      }, { root: deck, threshold: [0.5] });
      document.querySelectorAll('.deck-page').forEach(p => io.observe(p));
    }

    // ---------- UI: Categoria chips ----------
    function renderChips() {
      const c = $('f-categoria');
      c.innerHTML = '';
      CATEGORIES.forEach(cat => {
        const b = document.createElement('button');
        b.className = 'chip';
        b.textContent = cat;
        b.type = 'button';
        b.onclick = () => {
          document.querySelectorAll('#f-categoria .chip').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
          selectedCategoria = cat;
        };
        c.appendChild(b);
      });
    }

    // ---------- Init ----------
    async function init() {
      renderChips();
      wireValorMask($('f-valor'));
      // Default date to today in local time (not UTC — avoids the date rolling
      // forward late at night in negative-offset timezones like America/Sao_Paulo).
      const today = new Date();
      const pad = n => String(n).padStart(2, '0');
      $('f-data').value = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;
      await loadFaturas();
      await loadCurrentFatura();
      refreshFaturaDisplay();
      refreshRolloverBanner();
      populateHistoryFilter();
      wireDeckObserver();
      // Make sure we start anchored to + Novo (deck.scrollLeft = 0).
      $('deck').scrollLeft = 0;
    }

    async function loadFaturas() {
      try {
        const cached = cacheGet('faturas');
        if (cached) { state.faturas = cached.payload.faturas || []; }
        const fresh = await api('faturas/list', {});
        state.faturas = fresh.faturas || [];
        cacheSet('faturas', fresh);
      } catch (err) {
        if (err.message === 'session_expired') return;
        // Non-fatal: form can still submit; server will set fatura_id = null.
      }
    }

    async function loadCurrentFatura() {
      try {
        const res = await api('faturas/current', {});
        state.currentFaturaId = res.fatura ? res.fatura.id : null;
        state.faturaOverrideSet = !!res.override_set;
        state.outroCount = Number(res.outro_count || 0);
        // Default Resumo's and Painel's view to the current fatura.
        if (summaryViewFaturaId == null) summaryViewFaturaId = state.currentFaturaId;
        if (painelViewFaturaId == null)  painelViewFaturaId  = state.currentFaturaId;
        refreshOutroBadge();
      } catch (err) {
        if (err.message === 'session_expired') return;
      }
    }

    // ---------- Rollover banner ----------
    // Fires when today's resolved fatura is strictly newer than the one the
    // user is "currently" in, AND they haven't pinned a fatura via override.
    function refreshRolloverBanner() {
      const banner = $('rollover');
      if (!banner) return;
      if (state.faturaOverrideSet) return banner.classList.add('hidden');

      const today = isoToday();
      const todayFatura = resolveFaturaForDateClient(today);
      if (!todayFatura) return banner.classList.add('hidden');
      if (state.currentFaturaId === todayFatura.id) return banner.classList.add('hidden');

      const currentRow = state.faturas.find(f => f.id === state.currentFaturaId);
      if (currentRow && currentRow.start_date >= todayFatura.start_date) {
        return banner.classList.add('hidden');
      }
      $('rollover-name').textContent = todayFatura.nome;
      banner.classList.remove('hidden');
    }

    function isoToday() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    $('rollover-btn').onclick = async () => {
      const today = isoToday();
      const todayFatura = resolveFaturaForDateClient(today);
      if (!todayFatura) return;
      state.currentFaturaId = todayFatura.id;
      summaryViewFaturaId = todayFatura.id;
      painelViewFaturaId  = todayFatura.id;
      refreshRolloverBanner();
      // Re-pull current-fatura state for the new cycle.
      await loadCurrentFatura();
      // If the user is on Resumo or Painel, reflect the switch immediately.
      const active = document.querySelector('.tab.active')?.dataset.tab;
      if (active === 'summary') loadSummary();
      if (active === 'painel')  loadPainel();
    };

    function refreshFaturaDisplay() {
      const iso = $('f-data').value;
      const f = resolveFaturaForDateClient(iso);
      $('f-fatura').value = f ? f.nome : '—';
    }

    // Recompute the fatura display whenever the user edits the date.
    document.addEventListener('change', e => {
      if (e.target && e.target.id === 'f-data') refreshFaturaDisplay();
    });

    // ---------- Submit (+ Novo) ----------
    $('submit-btn').onclick = async () => {
      const data = $('f-data').value;
      const descricao = $('f-descricao').value.trim();
      const valorStr = $('f-valor').value.trim();

      if (!data) return toast('Informe a data', 'err');
      if (!descricao) return toast('Informe a descrição', 'err');
      if (!valorStr) return toast('Informe o valor', 'err');
      if (!selectedCategoria) return toast('Escolha uma categoria', 'err');

      const valor = parseValor(valorStr);
      if (isNaN(valor)) return toast('Valor inválido', 'err');
      const valor_cents = Math.round(valor * 100);

      const btn = $('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        await api('transactions/create', {
          data, descricao, valor_cents, categoria: selectedCategoria,
        });
        cacheInvalidate('transactions');
        cacheInvalidateAllDerived();
        loadCurrentFatura();
        toast('Lançamento adicionado ✓', 'ok');
        $('f-descricao').value = '';
        $('f-valor').value = '';
        document.querySelectorAll('#f-categoria .chip').forEach(x => x.classList.remove('selected'));
        selectedCategoria = '';
      } catch (err) {
        if (err.message !== 'session_expired') {
          $('status-dot').className = 'status-dot err';
          toast('Erro: ' + err.message, 'err');
        }
      } finally {
        btn.disabled = false;
        btn.textContent = 'Adicionar lançamento';
      }
    };

    // ---------- History ----------
    function faturaNameById(id) {
      if (id == null) return '';
      const f = state.faturas.find(x => x.id === id);
      return f ? f.nome : '';
    }

    // Module-scoped cache of last-loaded rows so the inline editor can look up
    // the source row without another fetch.
    let historyRows = [];

    function renderEntry(r) {
      if (r.id === state.editingId) return renderEditingEntry(r);
      return `
        <div class="entry" data-id="${escapeHtml(r.id)}">
          <div class="entry-desc">${escapeHtml(r.descricao)}</div>
          <div class="entry-valor">${escapeHtml(formatBRL(r.valor_cents))}</div>
          <div class="entry-meta">
            <span>${escapeHtml(formatDate(r.data))}</span>
            <span class="entry-cat">${escapeHtml(r.categoria)}</span>
            <span>${escapeHtml(faturaNameById(r.fatura_id))}</span>
          </div>
        </div>`;
    }

    function renderEditingEntry(r) {
      const valorStr = (r.valor_cents / 100).toFixed(2).replace('.', ',');
      const chips = CATEGORIES.map(c => `
        <button class="chip ${c === r.categoria ? 'selected' : ''}" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>
      `).join('');
      const faturaName = (resolveFaturaForDateClient(r.data) || {}).nome || '—';
      return `
        <div class="entry editing" data-id="${escapeHtml(r.id)}">
          <div class="edit-row">
            <input class="edit-desc" maxlength="200" value="${escapeHtml(r.descricao)}">
          </div>
          <div class="edit-row">
            <input class="edit-valor" inputmode="decimal" value="${escapeHtml(valorStr)}">
            <input class="edit-data" type="date" value="${escapeHtml(r.data)}">
          </div>
          <div class="edit-fatura">${escapeHtml(faturaName)}</div>
          <div class="edit-chips">${chips}</div>
          <div class="edit-actions">
            <button class="edit-action" data-action="save">salvar</button>
            <button class="edit-action danger" data-action="delete">excluir</button>
            <button class="edit-action muted" data-action="cancel">cancelar</button>
          </div>
        </div>`;
    }

    function renderHistory(rows) {
      historyRows = rows;
      const el = $('history-list');
      if (!rows.length) { el.innerHTML = '<div class="empty">Nenhum lançamento ainda.</div>'; return; }
      el.innerHTML = rows.map(renderEntry).join('');
      wireRowInteractions();
    }

    // FLIP-ish: measure old height, swap DOM, measure new height, then animate
    // max-height between the two so display ⇄ edit transitions feel like the
    // row itself is morphing rather than two distinct elements.
    function rerenderRow(id, { animate = true } = {}) {
      const node = document.querySelector(`#history-list .entry[data-id="${id}"]`);
      const row = historyRows.find(r => r.id === id);
      if (!node || !row) return;

      const beforeH = animate ? node.offsetHeight : 0;
      const tmp = document.createElement('div');
      tmp.innerHTML = renderEntry(row);
      const newNode = tmp.firstElementChild;
      node.replaceWith(newNode);

      if (animate) {
        const afterH = newNode.offsetHeight;
        newNode.classList.add('morphing');
        newNode.style.maxHeight = beforeH + 'px';
        // Force layout so the next change actually transitions.
        newNode.offsetHeight; // eslint-disable-line no-unused-expressions
        requestAnimationFrame(() => {
          newNode.style.maxHeight = afterH + 'px';
        });
        setTimeout(() => {
          newNode.classList.remove('morphing');
          newNode.style.maxHeight = '';
        }, 280);
      }

      // Only re-wire the swapped node — touching other rows would stack
      // duplicate listeners every time anyone is edited.
      if (newNode.classList.contains('editing')) wireEditingRow(newNode);
      else wireDisplayRow(newNode);
    }

    async function loadHistory() {
      const el = $('history-list');
      const filter = historyCategoriaFilter;
      // Only cache the unfiltered "todas" view — filtered queries are quick
      // and infrequent enough that paying a network round-trip beats juggling
      // per-category cache keys.
      if (!filter) {
        const cached = cacheGet('transactions');
        if (cached) {
          renderHistory(cached.payload.transactions);
          setCacheAge('history-age', cached.ts);
          return;
        }
      }
      $('history-age').textContent = filter ? `filtro · ${filter.toLowerCase()}` : '';
      el.innerHTML = '<div class="empty">Carregando...</div>';
      try {
        const payload = { limit: 200 };
        if (filter) payload.categoria = filter;
        const fresh = await api('transactions/list', payload);
        if (!filter) cacheSet('transactions', fresh);
        renderHistory(fresh.transactions);
        if (!filter) setCacheAge('history-age', Date.now());
      } catch (err) {
        if (err.message === 'session_expired') return;
        el.innerHTML = `<div class="empty">Erro: ${escapeHtml(err.message)}</div>`;
      }
    }

    // ---------- Long-press → in-place edit ----------
    // A 500ms hold morphs the row into an editor. Movement cancels the timer,
    // so swipe-paging the tabs never accidentally triggers edit mode.
    let pressTimer;

    function wireRowInteractions() {
      document.querySelectorAll('#history-list .entry').forEach(el => {
        if (el.classList.contains('editing')) {
          wireEditingRow(el);
        } else {
          wireDisplayRow(el);
        }
      });
    }

    function wireDisplayRow(el) {
      const id = el.dataset.id;
      const onStart = () => {
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
          // Closing any other open editor first
          if (state.editingId && state.editingId !== id) {
            const prev = state.editingId;
            state.editingId = null;
            rerenderRow(prev);
          }
          state.editingId = id;
          rerenderRow(id);
          // Focus descricao input so the keyboard pops on iPhone
          const input = document.querySelector(`#history-list .entry[data-id="${id}"] .edit-desc`);
          if (input) input.focus();
        }, 500);
      };
      const onEnd = () => clearTimeout(pressTimer);
      el.addEventListener('touchstart', onStart, { passive: true });
      el.addEventListener('touchend', onEnd);
      el.addEventListener('touchcancel', onEnd);
      el.addEventListener('touchmove', onEnd);
      el.addEventListener('mousedown', onStart);
      el.addEventListener('mouseup', onEnd);
      el.addEventListener('mouseleave', onEnd);
    }

    function wireEditingRow(el) {
      const id = el.dataset.id;
      wireValorMask(el.querySelector('.edit-valor'));
      // Chip selection inside the editor
      el.querySelectorAll('.edit-chips .chip').forEach(chip => {
        chip.onclick = () => {
          el.querySelectorAll('.edit-chips .chip').forEach(x => x.classList.remove('selected'));
          chip.classList.add('selected');
        };
      });
      // Live-update the fatura label when the date changes
      const dataInput = el.querySelector('.edit-data');
      const faturaEl = el.querySelector('.edit-fatura');
      if (dataInput && faturaEl) {
        dataInput.addEventListener('change', () => {
          const f = resolveFaturaForDateClient(dataInput.value);
          faturaEl.textContent = f ? f.nome : '—';
        });
      }
      el.querySelectorAll('.edit-action').forEach(btn => {
        btn.onclick = () => handleEditAction(id, btn.dataset.action);
      });
    }

    async function handleEditAction(id, action) {
      const el = document.querySelector(`#history-list .entry[data-id="${id}"]`);
      if (!el) return;
      if (action === 'cancel') {
        state.editingId = null;
        rerenderRow(id);
        return;
      }
      if (action === 'delete') {
        await deleteWithUndo(id);
        return;
      }
      if (action === 'save') {
        const descricao = el.querySelector('.edit-desc').value.trim();
        const valorStr = el.querySelector('.edit-valor').value.trim();
        const data = el.querySelector('.edit-data').value;
        const selected = el.querySelector('.edit-chips .chip.selected');
        if (!descricao) return toast('Informe a descrição', 'err');
        if (!valorStr) return toast('Informe o valor', 'err');
        if (!data) return toast('Informe a data', 'err');
        if (!selected) return toast('Escolha uma categoria', 'err');

        const valor = parseValor(valorStr);
        if (isNaN(valor)) return toast('Valor inválido', 'err');
        const valor_cents = Math.round(valor * 100);
        const categoria = selected.dataset.cat;

        try {
          const prevCategoria = historyRows.find(r => r.id === id)?.categoria;
          const res = await api('transactions/update', {
            id, descricao, valor_cents, data, categoria,
          });
          cacheInvalidate('transactions');
          cacheInvalidateAllDerived();
          // Merge the server's updated row back into local state
          const idx = historyRows.findIndex(r => r.id === id);
          if (idx >= 0 && res.transaction) historyRows[idx] = res.transaction;
          state.editingId = null;
          rerenderRow(id);
          loadCurrentFatura();
          toast('Atualizado ✓', 'ok');
          // If we just categorized an Outro row, offer to remember it.
          if (prevCategoria === 'Outro' && categoria !== 'Outro') {
            maybePromptAddRule(descricao, categoria);
          }
        } catch (err) {
          if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
        }
      }
    }

    // ---------- Delete with undo ----------
    // Optimistic-ish: commit delete to server immediately so durability is
    // preserved if the user closes the tab. Undo within 4s calls restore.
    async function deleteWithUndo(id) {
      const el = document.querySelector(`#history-list .entry[data-id="${id}"]`);
      if (!el) return;
      const snapshot = historyRows.find(r => r.id === id);

      // Animate row collapse
      const h = el.getBoundingClientRect().height;
      el.classList.add('collapsing');
      el.style.maxHeight = h + 'px';
      requestAnimationFrame(() => {
        el.style.maxHeight = '0px';
        el.style.opacity = '0';
        el.style.padding = '0';
        el.style.margin = '0';
        el.style.borderWidth = '0';
      });
      setTimeout(() => el.remove(), 240);

      // Remove from local cache + state immediately
      historyRows = historyRows.filter(r => r.id !== id);
      state.editingId = null;

      try {
        await api('transactions/delete', { id });
        cacheInvalidate('transactions');
        cacheInvalidateAllDerived();
        loadCurrentFatura();
      } catch (err) {
        if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
        return;
      }

      toast('Lançamento excluído', 'ok', {
        label: 'desfazer',
        onClick: async () => {
          try {
            const res = await api('transactions/restore', { id });
            cacheInvalidate('transactions');
            cacheInvalidateAllDerived();
            loadCurrentFatura();
            // Reinsert at correct chronological position (server returns the full row)
            if (res.transaction) {
              historyRows.push(res.transaction);
              historyRows.sort((a, b) => {
                if (a.data !== b.data) return b.data.localeCompare(a.data);
                return (b.created_at || 0) - (a.created_at || 0);
              });
            } else if (snapshot) {
              historyRows.push(snapshot);
            }
            renderHistory(historyRows);
            toast('Restaurado ✓', 'ok');
          } catch (err) {
            if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
          }
        },
      });
    }
