    function renderPanel(title, total, rows) {
      if (!rows || !rows.length) return '';
      return `
        <div class="summary-card">
          <div class="summary-card-title">
            <span>${escapeHtml(title)}</span>
            <span class="total">${escapeHtml(formatBRL(total))}</span>
          </div>
          ${rows.map(r => `

            </div>

        </div>`;

    function renderAveragesStrip(byCategoria, averages) {
      const entries = Object.entries(averages || {}).filter(([, v]) => v);
      if (!entries.length) return '';
      const currByCat = Object.fromEntries(byCategoria.map(c => [c.categoria, c.total_cents]));
      entries.sort((a, b) => b[1] - a[1]);
      return `
        <div class="summary-card">
          <div class="summary-card-title"><span>Média histórica</span></div>
          ${entries.map(([cat, avg]) => {
            const cur = currByCat[cat] || 0;
            const delta = cur - avg;
            const pct = avg ? Math.round((delta / Math.abs(avg)) * 100) : 0;
            let cls = 'flat', label = '·';
            if (cur && pct !== 0) {
              cls = pct > 0 ? 'up' : 'down';
              label = (pct > 0 ? '+' : '') + pct + '%';
            }
            return `
              <div class="averages-row">
                <span class="cat">${escapeHtml(cat)}</span>
                <span class="avg">${escapeHtml(formatBRL(avg))}</span>
                <span class="delta ${cls}">${escapeHtml(label)}</span>
              </div>`;
          }).join('')}
        </div>`;
    }

          <div class="reserve-bar"><div class="fill" style="width: ${pct}%"></div></div>
          <div class="reserve-meta">
            <span>${escapeHtml(formatBRL(d.reserva_atual_cents))}</span>
            <span>meta · ${escapeHtml(formatBRL(d.reserva_meta_cents))}</span>
          </div>

        </div>`;

    function renderReserveSparkline(startCents, forecast) {
      if (!forecast || !forecast.projection || !forecast.projection.length) return '';
      const balances = [startCents, ...forecast.projection.map(p => p.balance_cents)];
      const min = Math.min(...balances);
      const max = Math.max(...balances);
      const range = Math.max(1, max - min);
      const w = 100, h = 30;
      const points = balances.map((b, i) => {
        const x = (i / (balances.length - 1)) * w;
        const y = h - ((b - min) / range) * h;
        return `${x.toFixed(2)},${y.toFixed(2)}`;
      });
      const polyline = points.join(' ');
      const areaPath = `M0,${h} L${points.join(' L')} L${w},${h} Z`;
      const endLabel = `Em ${balances.length - 1} meses · ${formatBRL(balances[balances.length - 1])}`;
      return `
        <svg class="reserve-spark" viewBox="0 0 100 30" preserveAspectRatio="none">
          <path d="${areaPath}"></path>
          <polyline points="${polyline}"></polyline>
        </svg>
        <div class="reserve-meta"><span>${escapeHtml(endLabel)}</span></div>`;
    }

                   value="${(s.taxa_juros_mensal_pct * 100).toFixed(2)}" />
            <span class="hint">% ao mês (para projeção)</span>
          </div>
          <div class="config-row">
            <span class="lbl">Dia de fechamento</span>
            <input id="cfg-fechamento" type="number" inputmode="numeric" min="1" max="31"
                   value="${s.fechamento_dia}" />
            <span class="hint">dia que a fatura fecha</span>
          </div>
          <div class="config-row">
            <span class="lbl">Fatura atual</span>
            <select id="cfg-override">${overrideOptions}</select>
            <span class="hint">"auto (hoje)" segue a data</span>
          </div>
          <div class="config-btn-row">
            <button class="config-btn" id="cfg-save">salvar</button>
          </div>
        </div>`;

      const faturasHtml = `
        <div class="config-section">
          <h3>Faturas</h3>
          <div id="config-faturas">${state.faturas.map(renderFaturaRow).join('')}</div>
          ${configState.addingFatura ? renderFaturaForm() : `
            <div class="config-btn-row" style="justify-content: flex-start;">
              <button class="config-btn" id="cfg-add-fatura">+ nova fatura</button>
            </div>`}
        </div>`;

      el.innerHTML = actionsHtml + settingsHtml + faturasHtml;
      wireConfigInteractions();
    }

    function renderFaturaRow(f) {
      if (f.id === configState.editingFaturaId) {
        const salStr = (f.salario_cents / 100).toFixed(2).replace('.', ',');
        return `
          <div class="fatura-row editing" data-id="${f.id}">
            ${faturaEditFields({ nome: f.nome, start_date: f.start_date, salStr })}
            <div class="config-btn-row" style="justify-content: flex-start;">
              <button class="config-btn" data-fatura-action="save">salvar</button>
              <button class="config-btn danger" data-fatura-action="delete">excluir</button>
              <button class="config-btn muted" data-fatura-action="cancel">cancelar</button>
            </div>
          </div>`;
      }
      return `
        <div class="fatura-row" data-id="${f.id}">
          <div class="nome">${escapeHtml(f.nome)}</div>
          <div class="actions">
            <button class="config-btn" data-fatura-action="edit">editar</button>
          </div>
          <div class="meta">início ${escapeHtml(formatDate(f.start_date))} · salário ${escapeHtml(formatBRL(f.salario_cents))}</div>
        </div>`;

    function renderFaturaForm() {
      return `
        <div class="fatura-row editing" data-id="new">
          ${faturaEditFields({ nome: '', start_date: '', salStr: '' })}
          <div class="config-btn-row" style="justify-content: flex-start;">
            <button class="config-btn" data-fatura-action="create">adicionar</button>
            <button class="config-btn muted" data-fatura-action="cancel-new">cancelar</button>
          </div>
        </div>`;
    }

    function faturaEditFields({ nome, start_date, salStr }) {
      return `
        <div class="fatura-edit">
          <div class="field full">
            <label>Nome da fatura</label>
            <input class="f-nome" maxlength="40" placeholder="Ex: Julho 2026" value="${escapeHtml(nome)}" />
          </div>
          <div class="field">
            <label>Início do ciclo</label>
            <input class="f-start" type="date" value="${escapeHtml(start_date)}" />
            <span class="hint">primeiro dia da fatura</span>
          </div>
          <div class="field">
            <label>Salário líquido</label>

            <span class="hint">em reais</span>
          </div>
        </div>`;

    function wireConfigInteractions() {
      const saveBtn = $('cfg-save');
      if (saveBtn) saveBtn.onclick = saveSettings;
      const addBtn = $('cfg-add-fatura');
      if (addBtn) addBtn.onclick = () => { configState.addingFatura = true; renderConfig(); };

      document.querySelectorAll('#config-body [data-open-subpage]').forEach(btn => {
        btn.onclick = () => openSubpage(btn.dataset.openSubpage);
      });

      document.querySelectorAll('#config-faturas [data-fatura-action], #config-body .fatura-row[data-id="new"] [data-fatura-action]').forEach(btn => {
        btn.onclick = () => handleFaturaAction(btn.closest('.fatura-row'), btn.dataset.faturaAction);
      });

      ['cfg-reserva', 'cfg-meta', 'cfg-meta-mult', 'cfg-taxa', 'cfg-fechamento'].forEach(id => {
        const inp = $(id);
        if (inp && (id === 'cfg-reserva')) wireValorMask(inp);
      });

      document.querySelectorAll('#config-body .f-salario').forEach(inp => wireValorMask(inp));
    }

    async function saveSettings() {
      const patch = {};
      const metaPct = Number($('cfg-meta').value);
      if (!isNaN(metaPct)) patch.meta_investimento_pct = Math.max(0, Math.min(1, metaPct / 100));
      const reservaValor = parseValor($('cfg-reserva').value);
      if (!isNaN(reservaValor)) patch.reserva_atual_cents = Math.round(reservaValor * 100);
      const mult = Number($('cfg-meta-mult').value);
      if (!isNaN(mult)) patch.reserva_meta_multiplier = mult;
      const taxa = Number($('cfg-taxa').value);
      if (!isNaN(taxa)) patch.taxa_juros_mensal_pct = taxa / 100;
      const fechamento = parseInt($('cfg-fechamento').value, 10);
      if (Number.isInteger(fechamento)) patch.fechamento_dia = fechamento;
      const overrideRaw = $('cfg-override').value;
      patch.current_fatura_override_id = overrideRaw === '' ? null : Number(overrideRaw);

      const btn = $('cfg-save');
      btn.disabled = true;
      btn.textContent = 'salvando...';
      try {
        const res = await api('settings/update', patch);
        configState.settings = res.settings;
        cacheInvalidateAllDerived();
        // The override may change which fatura "current" resolves to.
        await loadCurrentFatura();
        toast('Configurações salvas ✓', 'ok');
        renderConfig();
      } catch (err) {
        if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'salvar';
      }
    }

    async function handleFaturaAction(row, action) {
      const id = row.dataset.id;
      if (action === 'edit') {
        configState.editingFaturaId = Number(id);
        renderConfig();
        return;
      }
      if (action === 'cancel') {
        configState.editingFaturaId = null;
        renderConfig();
        return;
      }
      if (action === 'cancel-new') {
        configState.addingFatura = false;
        renderConfig();
        return;
      }
      if (action === 'save' || action === 'create') {
        const nome = row.querySelector('.f-nome').value.trim();
        const start_date = row.querySelector('.f-start').value;
        const salStr = row.querySelector('.f-salario').value.trim();
        if (!nome) return toast('Informe o nome', 'err');
        if (!start_date) return toast('Informe a data de início', 'err');
        const salNum = salStr ? parseValor(salStr) : 0;
        if (isNaN(salNum)) return toast('Salário inválido', 'err');
        const salario_cents = Math.round(salNum * 100);
        try {
          if (action === 'create') {
            await api('faturas/create', { nome, start_date, salario_cents });
            configState.addingFatura = false;
            toast('Fatura adicionada ✓', 'ok');
          } else {
            await api('faturas/update', { id: Number(id), nome, start_date, salario_cents });
            configState.editingFaturaId = null;
            toast('Fatura atualizada ✓', 'ok');
          }
          await refreshAfterFaturaWrite();
        } catch (err) {
          if (err.message === 'duplicate_fatura_name') toast('Nome de fatura já existe', 'err');
          else if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
        }
        return;
      }
      if (action === 'delete') {
        if (!confirm('Excluir esta fatura?')) return;
        try {
          await api('faturas/delete', { id: Number(id) });
          configState.editingFaturaId = null;
          toast('Fatura excluída', 'ok');
          await refreshAfterFaturaWrite();
        } catch (err) {
          if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
        }
      }
    }

    async function refreshAfterFaturaWrite() {
      cacheInvalidate('faturas');
      cacheInvalidate('transactions');
      cacheInvalidateAllDerived();
      await loadFaturas();
      await loadCurrentFatura();
      renderConfig();
    }

    // ---------- Outro inbox badge ----------
    // Count comes from /api/faturas/current — refreshed on init, rollover,
    // settings/fatura writes, and after every transaction or import write.
    function refreshOutroBadge() {
      const badge = $('outro-badge');
      const count = Number(state.outroCount || 0);
      $('outro-count').textContent = String(count);
      badge.classList.toggle('visible', count > 0);
    }

    $('outro-badge').onclick = () => {
      const sel = $('history-cat');
      if (sel) sel.value = 'Outro';
      historyCategoriaFilter = 'Outro';
      scrollToTab('history');
      loadHistory();
    };

    // ---------- Histórico filter ----------
    let historyCategoriaFilter = '';

    function populateHistoryFilter() {
      const sel = $('history-cat');
      if (!sel) return;
      const current = sel.value;
      sel.innerHTML = '<option value="">todas</option>' +
        CATEGORIES.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
      sel.value = current;
    }

    document.addEventListener('change', e => {
      if (e.target && e.target.id === 'history-cat') {
        historyCategoriaFilter = e.target.value || '';
        loadHistory();
      }
    });

    // ---------- Regras (merchant rules) ----------
    let rulesState = { rules: [], addingRule: false };

    async function loadRegras() {
      const el = $('regras-body');
      try {
        const res = await api('rules/list', {});
        rulesState.rules = res.rules || [];
        renderRegras();
      } catch (err) {
        if (err.message === 'session_expired') return;
        el.innerHTML = `<div class="empty">Erro: ${escapeHtml(err.message)}</div>`;
      }
    }

    function renderRegras() {
      const el = $('regras-body');
      const rows = rulesState.rules.map((r, idx) => renderRegraRow(r, idx, rulesState.rules.length)).join('');
      const listHtml = rulesState.rules.length
        ? `<div class="regras-list">${rows}</div>`
        : '<div class="empty">Nenhuma regra ainda.</div>';
      const addHtml = rulesState.addingRule
        ? renderAddRegraForm()
        : `<button class="add-regra-btn" id="add-regra">+ nova regra</button>`;
      el.innerHTML = listHtml + addHtml;
      wireRegrasInteractions();
    }

    function renderRegraRow(r, idx, total) {
      const opts = CATEGORIES.map(c =>
        `<option value="${escapeHtml(c)}" ${c === r.categoria ? 'selected' : ''}>${escapeHtml(c)}</option>`
      ).join('');
      const upDisabled  = idx === 0 ? 'disabled' : '';
      const dnDisabled  = idx === total - 1 ? 'disabled' : '';
      return `
        <div class="regra-row" data-id="${r.id}">
          <input class="chave" maxlength="80" value="${escapeHtml(r.chave)}" />
          <select class="cat">${opts}</select>
          <div class="arrows">
            <button class="arrow-btn" data-act="up" ${upDisabled}>▲</button>
            <button class="arrow-btn" data-act="down" ${dnDisabled}>▼</button>
          </div>
          <div class="regra-actions">
            <button class="regra-action danger" data-act="del">excluir</button>
          </div>
        </div>`;
    }

    function renderAddRegraForm() {
      const opts = CATEGORIES.map(c =>
        `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`
      ).join('');
      return `
        <div class="regras-list">
          <div class="regra-row" data-id="new">
            <input class="chave" id="new-regra-chave" maxlength="80" placeholder="ex: ifood" />
            <select class="cat" id="new-regra-cat">${opts}</select>
            <div class="arrows"></div>
            <div class="regra-actions">
              <button class="regra-action" data-act="create">adicionar</button>
              <button class="regra-action muted" data-act="cancel-new">cancelar</button>
            </div>
          </div>
        </div>`;
    }

    function wireRegrasInteractions() {
      const addBtn = $('add-regra');
      if (addBtn) addBtn.onclick = () => { rulesState.addingRule = true; renderRegras(); setTimeout(() => $('new-regra-chave')?.focus(), 50); };

      // Save on blur for chave / change for select. No save button: keeps UI quiet.
      document.querySelectorAll('#regras-body .regra-row[data-id]:not([data-id="new"]) .chave').forEach(inp => {
        inp.addEventListener('blur', () => saveRegraField(inp.closest('.regra-row'), 'chave', inp.value.trim()));
      });
      document.querySelectorAll('#regras-body .regra-row[data-id]:not([data-id="new"]) .cat').forEach(sel => {
        sel.addEventListener('change', () => saveRegraField(sel.closest('.regra-row'), 'categoria', sel.value));
      });

      document.querySelectorAll('#regras-body .regra-row .arrow-btn').forEach(btn => {
        btn.onclick = () => handleRegraArrow(btn.closest('.regra-row'), btn.dataset.act);
      });
      document.querySelectorAll('#regras-body .regra-row .regra-action').forEach(btn => {
        btn.onclick = () => handleRegraAction(btn.closest('.regra-row'), btn.dataset.act);
      });
    }

    async function saveRegraField(row, field, value) {
      const id = Number(row.dataset.id);
      const existing = rulesState.rules.find(r => r.id === id);
      if (!existing) return;
      if (existing[field] === value) return;
      if (field === 'chave' && !value) {
        row.querySelector('.chave').value = existing.chave;
        toast('Chave não pode ser vazia', 'err');
        return;
      }
      try {
        const res = await api('rules/update', { id, [field]: value });
        if (res.rule) {
          const idx = rulesState.rules.findIndex(r => r.id === id);
          if (idx >= 0) rulesState.rules[idx] = res.rule;
        }
      } catch (err) {
        if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
        row.querySelector('.' + (field === 'categoria' ? 'cat' : 'chave')).value = existing[field];
      }
    }

    async function handleRegraArrow(row, dir) {
      const id = Number(row.dataset.id);
      const idx = rulesState.rules.findIndex(r => r.id === id);
      const swap = dir === 'up' ? idx - 1 : idx + 1;
      if (idx < 0 || swap < 0 || swap >= rulesState.rules.length) return;
      const r = rulesState.rules;
      [r[idx], r[swap]] = [r[swap], r[idx]];
      renderRegras();
      try {
        await api('rules/reorder', { ids: r.map(x => x.id) });
      } catch (err) {
        if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
        await loadRegras();
      }
    }

    async function handleRegraAction(row, act) {
      if (act === 'cancel-new') {
        rulesState.addingRule = false;
        renderRegras();
        return;
      }
      if (act === 'create') {
        const chave = $('new-regra-chave').value.trim();
        const categoria = $('new-regra-cat').value;
        if (!chave) return toast('Informe a chave', 'err');
        if (!categoria) return toast('Escolha a categoria', 'err');
        try {
          const res = await api('rules/create', { chave, categoria });
          if (res.rule) rulesState.rules.push(res.rule);
          rulesState.addingRule = false;
          renderRegras();
          toast('Regra adicionada ✓', 'ok');
        } catch (err) {
          if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
        }
        return;
      }
      if (act === 'del') {
        const id = Number(row.dataset.id);
        if (!confirm('Excluir esta regra?')) return;
        try {
          await api('rules/delete', { id });
          rulesState.rules = rulesState.rules.filter(r => r.id !== id);
          renderRegras();
          toast('Regra excluída', 'ok');
        } catch (err) {
          if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
        }
      }
    }

    // After categorizing an Outro row, offer to remember the merchant. The
    // guess is the first token of the descricao split on whitespace/*, which
    // matches the Nubank shape "IFOOD *RESTAURANT" → "IFOOD".
    function guessChaveFromDescricao(desc) {
      const token = String(desc).split(/[\s*]+/).filter(Boolean)[0] || '';
      return token.toLowerCase();
    }

    async function maybePromptAddRule(descricao, categoria) {
      if (!descricao || !categoria || categoria === 'Outro') return;
      const guess = guessChaveFromDescricao(descricao);
      if (!guess) return;
      // Lazy-load rules so the first edit doesn't pay this latency.
      if (!rulesState.rules.length) {
        try { rulesState.rules = (await api('rules/list', {})).rules || []; }
        catch { return; }
      }
      // Already covered by an existing rule? Don't nag.
      if (rulesState.rules.some(r => guess.includes((r.chave || '').toLowerCase()))) return;
      toast(`Adicionar regra "${guess}" → ${categoria}?`, 'ok', {
        label: 'sim',
        onClick: async () => {
          try {
            const res = await api('rules/create', { chave: guess, categoria });
            if (res.rule) rulesState.rules.push(res.rule);
            toast('Regra adicionada ✓', 'ok');
          } catch (err) {
            if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
          }
        },
      });
    }

    // ---------- Importar (CSV) ----------
    let importState = { rows: [], previewed: false };

    function renderImportView() {
      const el = $('import-body');
      el.innerHTML = `
        <div class="import-section">
          <h3>Colar CSV (Nubank: date,title,amount)</h3>
          <textarea id="import-csv" class="import-textarea" placeholder="date,title,amount&#10;2026-05-04,IFOOD *RESTAURANT,42.90"></textarea>
          <label class="import-file">
            ou enviar arquivo:
            <input type="file" id="import-file" accept=".csv,text/csv" />
          </label>
          <div class="import-btn-row">
            <button class="import-btn" id="import-preview">Pré-visualizar</button>
            <button class="import-btn primary" id="import-confirm" disabled>Confirmar</button>
            <button class="import-btn" id="import-cancel">Cancelar</button>
          </div>
        </div>
        <div id="import-preview-body"></div>
      `;
      wireImportInteractions();
      // Re-render preview body if previously previewed (e.g., user swiped away and back).
      if (importState.previewed) renderImportPreview();
    }

    function wireImportInteractions() {
      $('import-preview').onclick = doImportPreview;
      $('import-confirm').onclick = doImportConfirm;
      $('import-cancel').onclick = doImportCancel;
      $('import-file').addEventListener('change', async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const text = await file.text();
        $('import-csv').value = text;
      });
    }

    function doImportCancel() {
      const hadAnything = importState.previewed || $('import-csv').value.trim() || ($('import-file').files && $('import-file').files.length);
      if (!hadAnything) return;
      importState = { rows: [], previewed: false };
      $('import-csv').value = '';
      $('import-file').value = '';
      $('import-preview-body').innerHTML = '';
      $('import-confirm').disabled = true;
      toast('Importação cancelada', 'ok');
    }

    async function doImportPreview() {
      const csv = $('import-csv').value;
      if (!csv.trim()) return toast('Cole o CSV antes', 'err');
      const btn = $('import-preview');
      btn.disabled = true;
      btn.textContent = 'Processando...';
      try {
        const res = await api('import/preview', { csv });
        importState.rows = (res.rows || []).map(r => ({ ...r, original_categoria: r.categoria }));
        importState.previewed = true;
        renderImportPreview();
      } catch (err) {
        if (err.message === 'csv_parse_failed') toast('CSV inválido — confira o cabeçalho date,title,amount', 'err');
        else if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Pré-visualizar';
      }
    }

    function renderImportPreview() {
      const body = $('import-preview-body');
      const rows = importState.rows;
      if (!rows.length) { body.innerHTML = ''; return; }

      const valid = rows.filter(r => !r.invalid);
      const invalid = rows.filter(r => r.invalid);
      const outroCount = valid.filter(r => r.categoria === 'Outro').length;

      const summaryHtml = `
        <div class="preview-summary">
          <span>${valid.length} lançamento${valid.length === 1 ? '' : 's'}</span>
          <span>${outroCount} sem regra</span>
        </div>`;

      const rowsHtml = rows.map((r, i) => renderPreviewRow(r, i)).join('');

      const invalidHtml = invalid.length
        ? `<div class="preview-invalid">${invalid.length} linha(s) inválida(s) — ignoradas no envio</div>`
        : '';

      body.innerHTML = `
        <div class="import-section">
          ${summaryHtml}
          ${rowsHtml}
          ${invalidHtml}
        </div>`;

      $('import-confirm').disabled = valid.length === 0;
      wirePreviewRowInteractions();
    }

    function renderPreviewRow(r, i) {
      if (r.invalid) {
        return `
          <div class="preview-row" data-idx="${i}">
            <div class="desc">${escapeHtml(r.descricao || '(sem descrição)')}</div>
            <div class="val">${escapeHtml(r.raw_amount || '')}</div>
            <div class="meta"><span class="outro-flag">inválido: ${escapeHtml(r.reason)}</span></div>
          </div>`;
      }
      const opts = CATEGORIES.map(c =>
        `<option value="${escapeHtml(c)}" ${c === r.categoria ? 'selected' : ''}>${escapeHtml(c)}</option>`
      ).join('');
      const outroCls = r.categoria === 'Outro' ? ' outro' : '';
      return `
        <div class="preview-row${outroCls}" data-idx="${i}">
          <div class="desc">${escapeHtml(r.descricao)}</div>
          <div class="val">${escapeHtml(formatBRL(r.valor_cents))}</div>
          <div class="meta">
            <span>${escapeHtml(formatDate(r.data))}</span>
            <select class="cat-sel">${opts}</select>
            <span>${escapeHtml(r.fatura_nome || '—')}</span>
            ${r.categoria === 'Outro' ? '<span class="outro-flag">Sem regra</span>' : ''}
          </div>
        </div>`;
    }

    function wirePreviewRowInteractions() {
      document.querySelectorAll('#import-preview-body .preview-row .cat-sel').forEach(sel => {
        sel.addEventListener('change', () => {
          const row = sel.closest('.preview-row');
          const r = importState.rows[Number(row.dataset.idx)];
          if (!r || r.invalid) return;
          r.categoria = sel.value;
          // Toggle Outro state in place — avoids re-rendering the row and
          // re-attaching listeners on every dropdown change (was O(N²) over
          // many rows).
          const isOutro = r.categoria === 'Outro';
          row.classList.toggle('outro', isOutro);
          const meta = row.querySelector('.meta');
          const flag = meta && meta.querySelector('.outro-flag');
          if (isOutro && !flag) {
            const span = document.createElement('span');
            span.className = 'outro-flag';
            span.textContent = 'Sem regra';
            meta.appendChild(span);
          } else if (!isOutro && flag) {
            flag.remove();
          }
        });
      });
      document.querySelectorAll('#import-preview-body .preview-row').forEach(wireSwipeToDismiss);
    }

    // iOS-style swipe-to-dismiss. We lock direction on the first significant
    // touchmove: if vertical, we hand off to the page's native scrolling and
    // never touch transform. If horizontal-left, we follow the finger and
    // dismiss past 40% of the row width. Horizontal-right (would-be
    // previous-tab gesture) is intentionally swallowed inside rows — the
    // user can swipe outside any row to change tabs, matching the spec.
    function wireSwipeToDismiss(rowEl) {
      let startX = 0, startY = 0, currentX = 0;
      let direction = null;
      let active = false;

      const DISMISS_THRESHOLD = 0.4;        // fraction of row width
      const DIR_LOCK_PX = 8;                // initial movement before locking

      function onStart(e) {
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX;
        startY = t.clientY;
        currentX = 0;
        direction = null;
        active = true;
        rowEl.classList.add('swiping');
      }

      function onMove(e) {
        if (!active) return;
        const t = e.touches ? e.touches[0] : e;
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;

        if (direction === null) {
          if (Math.abs(dx) < DIR_LOCK_PX && Math.abs(dy) < DIR_LOCK_PX) return;
          direction = Math.abs(dy) > Math.abs(dx) ? 'vertical' : 'horizontal';
          if (direction === 'vertical') {
            // Restore easing so any micro-jitter we introduced settles cleanly.
            rowEl.classList.remove('swiping');
            return;
          }
        }
        if (direction !== 'horizontal') return;

        // Left-only: positive dx (right swipe) shouldn't push the row off-screen.
        const w = rowEl.offsetWidth || 1;
        const clamped = Math.min(0, Math.max(-w, dx));
        currentX = clamped;
        rowEl.style.transform = `translateX(${clamped}px)`;
        rowEl.style.opacity = String(1 - Math.min(1, Math.abs(clamped) / w) * 0.5);
      }

      function onEnd() {
        if (!active) return;
        active = false;
        rowEl.classList.remove('swiping');
        if (direction === 'horizontal' && Math.abs(currentX) > rowEl.offsetWidth * DISMISS_THRESHOLD) {
          dismissPreviewRow(rowEl);
        } else {
          rowEl.style.transform = '';
          rowEl.style.opacity = '';
        }
      }

      rowEl.addEventListener('touchstart', onStart, { passive: true });
      rowEl.addEventListener('touchmove', onMove, { passive: true });
      rowEl.addEventListener('touchend', onEnd);
      rowEl.addEventListener('touchcancel', onEnd);
    }

    // Slide the row fully off-screen, collapse its vertical footprint, then
    // splice the underlying state and re-render. Two-stage animation (slide
    // first, then height collapse) matches the iOS feel where the row leaves
    // before its neighbours close the gap.
    function dismissPreviewRow(rowEl) {
      const idx = Number(rowEl.dataset.idx);
      const h = rowEl.getBoundingClientRect().height;
      rowEl.style.maxHeight = h + 'px';
      // Force layout so the next change actually transitions.
      rowEl.offsetHeight; // eslint-disable-line no-unused-expressions

      rowEl.style.transform = `translateX(-${rowEl.offsetWidth}px)`;
      rowEl.style.opacity = '0';

      setTimeout(() => {
        rowEl.style.maxHeight = '0px';
        rowEl.style.paddingTop = '0';
        rowEl.style.paddingBottom = '0';
        rowEl.style.borderTopWidth = '0';
      }, 130);

      setTimeout(() => {
        importState.rows.splice(idx, 1);
        if (!importState.rows.length) {
          importState.previewed = false;
          $('import-preview-body').innerHTML = '';
          $('import-confirm').disabled = true;
        } else {
          renderImportPreview();
        }
      }, 360);
    }

    async function doImportConfirm() {
      const rows = importState.rows
        .filter(r => !r.invalid)
        .map(r => ({
          data: r.data,
          descricao: r.descricao,
          valor_cents: r.valor_cents,
          categoria: r.categoria,
          manually_categorized: r.categoria !== r.original_categoria,
        }));
      if (!rows.length) return toast('Nada para importar', 'err');

      const btn = $('import-confirm');
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      try {
        const res = await api('import/confirm', { rows });
        cacheInvalidate('transactions');
        cacheInvalidateAllDerived();
        loadCurrentFatura();
        toast(`${res.inserted_count} lançamento(s) adicionado(s) ✓`, 'ok');
        importState = { rows: [], previewed: false };
        $('import-preview-body').innerHTML = '';
        $('import-csv').value = '';
        $('import-file').value = '';
        scrollToTab('history');
      } catch (err) {
        if (err.message !== 'session_expired') toast('Erro: ' + err.message, 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Confirmar';
      }
    }

    // Takes signed integer cents → "R$ 1.234,56" (sign preserved).
    function formatBRL(cents) {
      const n = (Number(cents) || 0) / 100;
      const sign = n < 0 ? '-' : '';
      const v = Math.abs(n).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return sign + 'R$ ' + v;
    }

    // ISO YYYY-MM-DD → dd/mm/yyyy
    function formatDate(iso) {
      if (!iso || typeof iso !== 'string') return '';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    // Given an ISO date, find the fatura whose start_date is the largest <= iso.
    // Returns the row or null. state.faturas is ordered start_date DESC.
    function resolveFaturaForDateClient(iso) {
      if (!iso) return null;
      for (const f of state.faturas) {
        if (f.start_date <= iso) return f;
      }
      return null;
    }

    // The rightmost separator is always the decimal point; any prior separators
    // are stripped as thousands grouping. The input mask (wireValorMask) caps
    // typed input to ≤2 decimal digits, so "10,9" parses as 10.9 not 109.
    function parseValor(s) {
      s = String(s).trim().replace(/[^\d.,\-]/g, '');
      if (!s) return NaN;
      const sign = s.startsWith('-') ? -1 : 1;
      s = s.replace(/-/g, '');
      if (!s) return NaN;
      const lastSep = Math.max(s.lastIndexOf('.'), s.lastIndexOf(','));
      const intPart = lastSep < 0 ? s : s.slice(0, lastSep).replace(/[.,]/g, '');
      const fracPart = lastSep < 0 ? '' : s.slice(lastSep + 1);
      const n = parseFloat((intPart || '0') + (fracPart ? '.' + fracPart : ''));
      return isNaN(n) ? NaN : sign * n;
    }

    // Live-clamp the valor input to: optional leading "-", digits, at most one
    // separator (. or ,), and at most 2 decimal digits. Wired on the + Novo
    // input and on each inline-edit row's valor input.
    function wireValorMask(input) {
      if (!input || input.dataset.valorMasked) return;
      input.dataset.valorMasked = '1';
      input.addEventListener('input', () => {
        const before = input.value;
        let v = before.replace(/[^\d.,\-]/g, '');
        const hadMinus = v.startsWith('-');
        v = v.replace(/-/g, '');
        const firstSep = v.search(/[.,]/);
        if (firstSep >= 0) {
          v = v.slice(0, firstSep + 1) + v.slice(firstSep + 1).replace(/[.,]/g, '');
          v = v.replace(/([.,]\d{2}).*/, '$1');
        }
        if (hadMinus) v = '-' + v;
        if (v !== before) {
          const pos = Math.max(0, (input.selectionStart || 0) - (before.length - v.length));
          input.value = v;
          try { input.setSelectionRange(pos, pos); } catch {}
        }
      });
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[m]));
    }

    // ---------- Toast ----------
    let toastTimer;
    function toast(msg, kind, action) {
      const el = $('toast');
      el.innerHTML = '';
      const span = document.createElement('span');
      span.textContent = msg;
      el.appendChild(span);
      if (action && action.label && typeof action.onClick === 'function') {
        const btn = document.createElement('button');
        btn.className = 'toast-action';
        btn.textContent = action.label;
        btn.onclick = (e) => {
          e.stopPropagation();
          el.className = 'toast ' + (kind || '');
          action.onClick();
        };
        el.appendChild(btn);
      }
      el.className = 'toast show ' + (kind || '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(
        () => el.className = 'toast ' + (kind || ''),
        action ? 4000 : 2400,
      );
    }
  </script>
</body>
</html>
